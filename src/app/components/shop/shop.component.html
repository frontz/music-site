<div class="container">
  <h3 class="text-center">Buy my albums here</h3>
  <div class="row">
    <div class="col-md-6 d-flex justify-content-center">
      <div class="card" style="width: 18rem;">
        <img src="assets/images/piano.jpg" class="card-img-top" alt="...">
        <div class="card-body">
          <h5 class="card-title">Piano solo</h5>
          <p class="card-text">Some quick example text to build on the card title and make up the bulk of the card's
            content.
          </p>
          <button class="btn btn-primary" [disabled]="quantityPS > 0" (click)="addPSToBasket()">Add to cart</button>
        </div>
      </div>
    </div>
    <div class="col-md-6 d-flex justify-content-center">
      <div class="card" style="width: 18rem;">
        <img src="assets/images/wt.jpg" class="card-img-top" alt="...">
        <div class="card-body">
          <h5 class="card-title">Word & Tears</h5>
          <p class="card-text">Some quick example text to build on the card title and make up the bulk of the card's
            content.
          </p>
          <button class="btn btn-primary" [disabled]="quantityWT > 0" (click)="addWTToBasket()">Add to cart</button>
        </div>
      </div>
    </div>
  </div>
</div>
